name: Lean4 Build Verification

on:
  push:
    paths:
      - '**.lean'
      - 'lakefile.lean'
      - 'lean-toolchain'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .elan and .lake
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-

      - name: Resolve dependencies (lake update)
        run: lake update

      - name: Get Mathlib4 prebuilt cache
        run: lake exe cache get

      - name: Build HuangzhongLaw72
        run: lake build HuangzhongLaw72

      - name: Verify no sorry
        run: |
          if grep -rn "\bsorry\b" HuangzhongLaw72.lean; then
            echo "ERROR: sorry found in HuangzhongLaw72.lean"
            exit 1
          fi
          echo "PASS: No sorry found. All 395 lines kernel-verified."
